# 域名与 ACME：与 .env 中 COZE_DOMAIN 一致（默认 coze.zcat.cn）
# HTTP：ACME HTTP-01 校验走 /.well-known/acme-challenge/ → 需公网 80 → 容器 80（WEB_LISTEN_ADDR=0.0.0.0:80）

server {
    listen 80;
    server_name coze.zcat.cn;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Let's Encrypt（certbot --webroot -w /var/www/certbot）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/snippets/coze-locations.conf;
}

